name: Nightly Models
run-name: Nightly Models 

on:
  push:
    branches: [main]
    paths:
      - 'models/**'
      - '.github/workflows/nightly.yml'
  workflow_dispatch:

# only one nightly run at a time — new master pushes cancel the
# previous run so we never publish older artifacts on top of newer ones
concurrency:
  group: nightly
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  discover:
    # only run automatically on the upstream repo; on forks, the workflow
    # is opt-in via the Actions UI so test merges don't generate stray
    # nightly releases
    if: github.repository == 'andriiryzhkov/dt-ai-ci' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      models: ${{ steps.find.outputs.models }}
      dt_version: ${{ steps.dt.outputs.version }}
      dt_prefix: ${{ steps.dt.outputs.prefix }}
      is_dev: ${{ steps.dt.outputs.is_dev }}
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true
          # full history + tags so git describe can resolve the latest
          # release-* tag for the nightly version label below
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - id: find
        name: Discover models
        run: |
          models=$(uv run dtai list --json-output)
          echo "models=$models" >> "$GITHUB_OUTPUT"

      - id: dt
        name: Derive nightly version from our own release-* tags
        run: |
          VERSION=$(./tools/get_git_version_string.sh)
          # X.Y.Z prefix only — drops +N~gXXX commit suffix and the
          # 4th revision component if present. used as the nightly tag
          # so darktable's release-discovery code can match it
          PREFIX=$(echo "$VERSION" | sed 's/[+~].*//' | awk -F. '{printf "%s.%s.%s", $1, $2, $3}')
          # only build nightly on dev cycles (odd minor: 5.5.x heading
          # to 5.6.0, 5.7.x heading to 5.8.0, ...). even-minor prefixes
          # mean master is on a stable line (no dev anchor tagged yet,
          # or running off a hotfix branch); skip publish
          MINOR=$(echo "$PREFIX" | awk -F. '{print $2}')
          IS_DEV=false
          case "$MINOR" in
            1|3|5|7|9) IS_DEV=true ;;
          esac
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "prefix=$PREFIX" >> "$GITHUB_OUTPUT"
          echo "is_dev=$IS_DEV" >> "$GITHUB_OUTPUT"
          echo "::notice::nightly version $PREFIX (is_dev=$IS_DEV)"

  build:
    needs: discover
    if: needs.discover.outputs.is_dev == 'true' && (github.repository == 'andriiryzhkov/dt-ai-ci' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.discover.outputs.models) }}
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --group ${{ matrix.dep_group }}

      - name: Download checkpoints
        run: uv run dtai setup ${{ matrix.id }}

      - name: Convert to ONNX
        run: uv run dtai convert ${{ matrix.id }}

      - name: Validate output
        run: uv run dtai validate ${{ matrix.id }}

      - name: Package model
        run: uv run dtai package ${{ matrix.id }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.id }}
          path: output/${{ matrix.id }}.dtmodel
          retention-days: 1

  publish:
    needs: [discover, build]
    # require dev cycle (odd minor) + every matrix member to succeed —
    # a broken model blocks the nightly publish rather than silently
    # shipping a missing artifact
    if: ${{ !cancelled() && needs.discover.outputs.is_dev == 'true' && needs.build.result == 'success' && (github.repository == 'andriiryzhkov/dt-ai-ci' || github.event_name == 'workflow_dispatch') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Generate versions.json
        run: uv run dtai versions

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      # delete nightly-* releases for OTHER versions (cross-version
      # cleanup when master moves from 5.5.x dev to 5.7.x dev)
      - name: Remove stale nightly releases
        env:
          GH_TOKEN: ${{ github.token }}
          NIGHTLY_TAG: nightly-${{ needs.discover.outputs.dt_prefix }}
        run: |
          for old in $(gh release list --json tagName \
                         -q '.[].tagName' | grep '^nightly-' || true); do
            if [ "$old" != "$NIGHTLY_TAG" ]; then
              gh release delete "$old" --yes --cleanup-tag
            fi
          done

      # force-move the current nightly-X.Y.Z tag to HEAD so the release
      # page's commit / date reflects when this build ran. matches DT's
      # nightly workflow; release is updated in place (allowUpdates) so
      # the URL stays stable across runs within the same dev cycle
      - name: Force move nightly tag
        env:
          NIGHTLY_TAG: nightly-${{ needs.discover.outputs.dt_prefix }}
        run: |
          git tag -d "$NIGHTLY_TAG" 2>/dev/null || true
          git push origin --delete "$NIGHTLY_TAG" 2>/dev/null || true
          git tag "$NIGHTLY_TAG"
          git push origin "$NIGHTLY_TAG"

      - name: Publish nightly release
        uses: ncipollo/release-action@v1.21.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag: nightly-${{ needs.discover.outputs.dt_prefix }}
          name: "nightly models ${{ needs.discover.outputs.dt_version }}"
          prerelease: true
          allowUpdates: true     # roll the same pre-release each run
          removeArtifacts: true  # wipe stale .dtmodel assets before uploading
          # if this workflow is ever dispatched manually from a tag (via
          # the Actions UI), hide the result as a draft so it doesn't
          # silently replace the rolling nightly with mismatched bytes
          draft: ${{ startsWith(github.ref, 'refs/tags/') }}
          body: |
            This is a nightly build of darktable AI models, tracking the `master` branch of `darktable-ai`. It targets the current development version of darktable ${{ needs.discover.outputs.dt_prefix }} and is rebuilt automatically whenever a model definition changes.

            You can use these if you want to try new or updated models without waiting for an official release. New checkpoints, format changes and packaging tweaks all land here first. The trade-off is the usual one – things move faster, things break more often, and behaviour can change between runs. **Use with caution.**

            To install, open *preferences → AI* in your nightly darktable build and download the models you want. Existing installations will pick up the update via the version check.

            __Please help us improve the models by reporting any issues you encounter!__ :wink:
          artifacts: |
            artifacts/*/*.dtmodel
            output/versions.json
